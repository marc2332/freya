[package]
name = "freya-code-editor"
description = "Composable Code Editor APIs for Freya"
version = "0.4.0-rc.17"
edition = "2024"
license = "MIT"
authors = ["Marc Espín <mespinsanz@gmail.com>"]
readme = "../../README.md"
homepage = "https://freyaui.dev/"
repository = "https://github.com/marc2332/freya"
keywords = ["freya"]
categories = ["gui"]

[lints]
workspace = true

[package.metadata.docs.rs]
features = ["freya-core/mocked-engine"]

[features]
all = ["rust", "md", "json", "toml", "sql"]
skia-engine = ["freya-core/skia-engine"]
rust = ["dep:tree-sitter-rust"]
md = ["dep:tree-sitter-md"]
json = ["dep:tree-sitter-json"]
toml = ["dep:tree-sitter-toml-ng"]
sql = ["dep:tree-sitter-sequel"]

[dependencies]
freya-core = { workspace = true }
freya-engine = { workspace = true }
freya-edit = { workspace = true }
freya-components = { workspace = true }
torin = { workspace = true }
ropey = { workspace = true }

smallvec = "1.15.1"
tree-sitter = "0.26"
tree-sitter-rust = { version = "0.24", optional = true }
tree-sitter-md = { version = "0.5", optional = true }
tree-sitter-json = { version = "0.24", optional = true }
tree-sitter-toml-ng = { version = "0.7", optional = true }
tree-sitter-sequel = { version = "0.3.11", optional = true }
rustc-hash = { workspace = true }
