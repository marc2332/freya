[package]
name = "freya-markdown"
version = "0.4.0-rc.22"
edition = "2024"
description = "Markdown rendering component for Freya"
license = "MIT"
authors = ["Marc Espín <mespinsanz@gmail.com>"]
readme = "../../README.md"
homepage = "https://freyaui.dev/"
repository = "https://github.com/marc2332/freya"
keywords = ["gui", "ui", "desktop", "skia"]
categories = ["gui"]

[lints]
workspace = true

[features]
router = ["freya-components/router"]
remote-asset = ["freya-components/remote-asset"]
code-editor = ["dep:freya-code-editor"]

[dependencies]
freya-core = { workspace = true }
freya-components = { workspace = true }
freya-code-editor = { workspace = true, optional = true, features = ["all"] }
torin = { workspace = true }

pulldown-cmark = "0.13"

[dev-dependencies]
freya = { path = "../freya", features = ["markdown"] }
freya-testing = { path = "../freya-testing" }
