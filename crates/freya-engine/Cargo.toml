[package]
name = "freya-engine"
description = "Abstract Freya's graphics APIs"
version = "0.4.0-rc.14"
edition = "2024"
license = "MIT"
authors = ["Marc Espín <mespinsanz@gmail.com>"]
readme = "../../README.md"
homepage = "https://freyaui.dev/"
repository = "https://github.com/marc2332/freya"
keywords = ["gui", "ui", "desktop", "skia", "graphics"]
categories = ["gui"]

[lints]
workspace = true

[package.metadata.docs.rs]
features = ["mocked-engine"]

[features]
mocked-engine = ["dep:glutin"]
skia-engine = ["dep:freya-skia-safe"]
opengl = ["freya-skia-safe/gl"]
vulkan = ["freya-skia-safe/vulkan"]
metal = ["freya-skia-safe/metal"]

[dependencies]
bitflags = { workspace = true }
freya-skia-safe = { workspace = true, optional = true }
glutin = { workspace = true, optional = true }

[target."cfg(target_os = \"linux\")".dependencies.freya-skia-safe]
workspace = true
optional = true
features = ["textlayout", "svg", "x11", "wayland"]

[target."cfg(target_os = \"macos\")".dependencies.freya-skia-safe]
workspace = true
optional = true
features = ["textlayout", "svg"]

[target."cfg(target_os = \"windows\")".dependencies.freya-skia-safe]
workspace = true
optional = true
features = ["textlayout", "svg"]

[dev-dependencies]
freya-engine = { path = "./", features = ["skia-engine"] }
