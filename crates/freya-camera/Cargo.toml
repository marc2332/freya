[package]
name = "freya-camera"
version = "0.4.0-rc.19"
description = "Camera capture support for Freya."
edition = "2024"
license = "MIT"
authors = ["Marc Espín <mespinsanz@gmail.com>"]
homepage = "https://github.com/marc2332/freya"
repository = "https://github.com/marc2332/freya"
keywords = ["freya", "camera", "webcam", "video"]
categories = ["gui", "multimedia::video"]

[lints]
workspace = true

[package.metadata.docs.rs]
features = ["freya-core/mocked-engine"]

[features]
skia-engine = ["freya-core/skia-engine"]

[dependencies]
freya-core = { workspace = true }
freya-engine = { workspace = true }
nokhwa = { version = "0.10", features = ["input-native"] }
bytes = { workspace = true }
futures-channel = { workspace = true, features = ["sink"] }
futures-lite = { workspace = true }
futures-util = { workspace = true, features = ["sink"] }
tracing = { workspace = true }

[dev-dependencies]
freya = { path = "../freya" }
