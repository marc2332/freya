[package]
name = "freya-router"
authors = ["Marc Espín <mespinsanz@gmail.com>"]
version = "0.4.0-rc.15"
edition = "2024"
description = "Router management for Freya apps"
license = "MIT"
readme = "./README.md"
repository = "https://github.com/marc2332/freya/"
keywords = ["gui", "ui", "desktop", "skia", "freya"]

[lints]
workspace = true

[package.metadata.docs.rs]
features = ["freya-core/mocked-engine"]

[features]
skia-engine = ["freya-core/skia-engine"]

[dependencies]
freya-core = { workspace = true }
freya-router-macro = { workspace = true }

urlencoding = "2.1.3"
url = { workspace = true }
rustversion = "1.0.21"

[dev-dependencies]
freya = { path = "../freya" }
