[package]
name = "freya-cli"
version = "0.4.0-rc.16"
authors = ["marc2332"]
edition = "2021"
description = "CLI for Freya."
repository = "https://github.com/marc2332/freya"
license = "MIT"
keywords = ["mobile", "gui", "cli"]
rust-version = "1.82.0"

[dependencies]
freya-hotreload = { path = "../freya-hotreload", features = ["serde"] }
depinfo = { version = "0.7.4" }
subsecond-types = { version = "0.7.4" }
clap = { version = "4.5.40", features = ["derive", "cargo"] }
convert_case = "0.8"
thiserror = { workspace = true }
uuid = { version = "1.17.0", features = ["v4", "v5", "v7", "serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
toml = "0.8"
cargo_toml = { version = "0.22.1", features = ["features"] }
futures-util = { workspace = true, features = ["async-await-macro"] }
notify = { version = "8.1.0", features = ["serde"] }
cargo_metadata = "0.19.2"
tokio = { workspace = true, features = ["full"] }

chrono = { version = "0.4.39" }
anyhow = { workspace = true }
rayon = "1.10.0"
futures-channel = { workspace = true }
krates = { version = "0.17.5" }
regex = "1.11.1"
console = "0.16.0"
walkdir = "2"
dunce = "1.0.5"

# tools download
dirs = "6.0.0"
# path lookup
which = { version = "8.0.0" }
brotli = "8.0.1"
ignore = "0.4.23"

tracing-subscriber = { version = "0.3.19", features = [
  "std",
  "env-filter",
  "json",
  "registry",
  "fmt",
] }
console-subscriber = { version = "0.4.1", optional = true }
schemars = "0.8"
tracing = { workspace = true }
ansi-to-tui = "8.0.1"
ansi-to-html = "0.2.2"

crossterm = { version = "0.28.1", features = ["event-stream"] }
ratatui = { version = "0.30.0", features = ["crossterm_0_28", "unstable"] }
shell-words = "1.1.0"

# link intercept
tempfile = "3.19.1"
target-lexicon = { version = "0.13.2", features = ["serde", "serde_support"] }

# Extracting data from an executable
object = { version = "0.37.1", features = ["all"] }
itertools = { workspace = true }
throbber-widgets-tui = "0.10.0"
unicode-segmentation = "1.12.0"
handlebars = "6.3.2"
# TODO: NO DEBERIA SER NECESARIA!!
wasmparser = "0.235.0"
plist = "1.7.4"
# backtrace = "0.3.74"
ar = "0.9.0"
pdb = "0.8.0"
cargo-config2 = "0.1.34"

[features]
default = []
tokio-console = ["dep:console-subscriber", "tokio/tracing"]
no-downloads = []
disable-telemetry = []

[[bin]]
path = "src/main.rs"
name = "fy"

[dev-dependencies]
escargot = "0.5"
indoc = "2.0.6"
pretty_assertions = "1"

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/dx-{ target }{ archive-suffix }"
pkg-fmt = "zip"

[package.metadata.docs.rs]
all-features = false
