[package]
name = "freya-terminal"
version = "0.4.0-rc.19"
description = "Terminal emulator integration for Freya"
edition = "2024"
license = "MIT"
authors = ["Marc Espín <mespinsanz@gmail.com>"]
repository = "https://github.com/marc2332/freya"
keywords = ["gui", "ui", "desktop", "terminal", "pty"]
categories = ["gui"]

[lints]
workspace = true

[package.metadata.docs.rs]
features = ["freya-engine/mocked-engine"]

[features]
skia-engine = ["freya-core/skia-engine"]

[dependencies]
freya-core = { workspace = true }
freya-engine = { workspace = true }
torin = { workspace = true }
rustc-hash = { workspace = true }
thiserror = { workspace = true }
blocking = { workspace = true }
keyboard-types = { workspace = true }

# PTY and terminal emulator
portable-pty = "0.9"
alacritty_terminal = "0.26"

# URL detection in terminal output
linkify = { workspace = true }

# Async
futures-channel = { workspace = true }
futures-lite = { workspace = true }

[dev-dependencies]
freya = { path = "../freya" }
