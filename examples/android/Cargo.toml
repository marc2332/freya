[package]
name = "android"
version = "0.1.0"
edition = "2024"

[dependencies]
freya = { workspace = true, features = ["router"] }
freya-winit = { workspace = true }
freya-router = { workspace = true }
env_logger = "0.11.9"
log = "0.4.29"

[target.'cfg(target_os="android")'.dependencies]
android_logger = "0.15.1"
winit = { version = "0.30.12", features = ["android-game-activity", "rwh_06"] }
jni = "0.19.0"

[lib]
path = "src/main.rs"
name = "android_example"
crate-type = ["cdylib", "rlib"]

[[bin]]
path = "src/main.rs"
name = "desktop_example"