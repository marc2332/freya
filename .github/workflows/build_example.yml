name: Build example

on:
  workflow_dispatch:
    inputs:
      os:
        description: "OS"
        required: true
        type: choice
        options:
          - macos-latest
          - ubuntu-latest
          - windows-latest
      example_name:
        description: "Example name"
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    if: ${{ always() }}
    strategy:
      matrix:
        os: ["${{ inputs.os }}"]
      fail-fast: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2
          submodules: true
      - name: Install stable rust toolchain
        uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94
      - name: Set up cargo cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "rust-${{ matrix.os }}"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update && sudo apt install build-essential libssl-dev pkg-config libglib2.0-dev libgtk-3-dev libudev-dev libxdo-dev libwebkit2gtk-4.1-dev

      - name: Build example
        run: cargo build --example ${{inputs.example_name}} --release

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          path: target/release/examples/*
