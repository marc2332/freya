name: Rust Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: rust-build-${{ github.ref_name }}
      cancel-in-progress: true

    steps:

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 2
        submodules: true
    - name: Install linux dependencies
      run: sudo apt update && sudo apt install build-essential libssl-dev pkg-config libglib2.0-dev libgtk-3-dev libudev-dev libxdo-dev libwebkit2gtk-4.1-dev libasound2-dev
    - name: Install stable rust toolchain
      uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94
    - name: Install just
      uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2.75.1
      with:
        tool: just
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        shared-key: "rust-ubuntu-latest"
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Build all --features
      run: just ba

  build-macos:
    runs-on: macos-latest
    concurrency:
      group: rust-build-macos-${{ github.ref_name }}
      cancel-in-progress: true

    steps:

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 2
        submodules: true
    - name: Install stable rust toolchain
      uses: dtolnay/rust-toolchain@aad518f59d88bae90133242f9ddac7f8bbc5dddf # 1.94
    - name: Install just
      uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2.75.1
      with:
        tool: just
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        shared-key: "rust-macos-latest"
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Build all --features
      run: just ba
