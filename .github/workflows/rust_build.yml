name: Rust Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: rust-build-${{ github.ref_name }}
      cancel-in-progress: true

    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 2
        submodules: true
    - name: Install linux dependencies
      run: sudo apt update && sudo apt install build-essential libssl-dev pkg-config libglib2.0-dev libgtk-3-dev libudev-dev libxdo-dev libwebkit2gtk-4.1-dev
    - name: Install stable rust toolchain
      uses: dtolnay/rust-toolchain@1.94
    - name: Install just
      uses: taiki-e/install-action@just
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "rust-ubuntu-latest"
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Build all --features
      run: just ba

  build-macos:
    runs-on: macos-latest
    concurrency:
      group: rust-build-macos-${{ github.ref_name }}
      cancel-in-progress: true

    steps:

    - uses: actions/checkout@v6
      with:
        fetch-depth: 2
        submodules: true
    - name: Install stable rust toolchain
      uses: dtolnay/rust-toolchain@1.94
    - name: Install just
      uses: taiki-e/install-action@just
    - name: Set up cargo cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "rust-macos-latest"
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Build all --features
      run: just ba
