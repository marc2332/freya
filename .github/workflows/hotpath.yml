name: Hotpath

on:
  pull_request:

jobs:
  hotpath:
    runs-on: ubuntu-latest
    concurrency:
      group: hotpath-${{ github.ref_name }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: dtolnay/rust-toolchain@1.94
      - name: Install just
        uses: taiki-e/install-action@just
      - name: Install hotpath-utils CLI
        run: cargo install hotpath --version '^0.14' --bin hotpath-utils --features=utils
      - name: Set up cargo cache
        uses: Swatinem/rust-cache@v2
        if: github.ref != 'refs/heads/main'
        with:
          shared-key: "rust-ubuntu-latest"
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update && sudo apt install build-essential libssl-dev pkg-config libglib2.0-dev libgtk-3-dev libudev-dev libxdo-dev libwebkit2gtk-4.1-dev
      - name: Create metrics directory
        run: mkdir -p /tmp/metrics
      - name: Head timing metrics
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/head_timing.json
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          just ps-ci
      - name: Base timing metrics
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/base_timing.json
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          just ps-ci
      - name: Head alloc metrics
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/head_alloc.json
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          just pa-ci
      - name: Base alloc metrics
        env:
          HOTPATH_OUTPUT_FORMAT: json
          HOTPATH_OUTPUT_PATH: /tmp/metrics/base_alloc.json
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          just pa-ci
      - name: Post PR comment - alloc mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          hotpath-utils profile-pr \
            --head-metrics /tmp/metrics/head_alloc.json \
            --base-metrics /tmp/metrics/base_alloc.json \
            --pr-number '${{ github.event.pull_request.number }}' \
            --benchmark-id "alloc" \
            --github-token "$GH_TOKEN"

      - name: Post PR comment - timing mode
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          hotpath-utils profile-pr \
            --head-metrics /tmp/metrics/head_timing.json \
            --base-metrics /tmp/metrics/base_timing.json \
            --pr-number '${{ github.event.pull_request.number }}' \
            --benchmark-id "timing" \
            --github-token "$GH_TOKEN"
