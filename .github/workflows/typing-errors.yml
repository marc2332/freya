name: Typing errors

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  spelling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Spell check with typos
        uses: crate-ci/typos@7b04f660f4ee4f048d18fd341887cf28dfbedfe2 # v1.46.3
        with:
          isolated: true
          config: ./_typos.toml
          files: .
