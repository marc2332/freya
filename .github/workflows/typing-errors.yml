name: Typing errors

on:
  push: {}
  pull_request: {}
  workflow_dispatch: {}

jobs:
  spelling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Spell check with typos
        uses: crate-ci/typos@bb4666ad77b539a6b4ce4eda7ebb6de553704021 # v1.42.0
        with:
          isolated: true
          config: ./_typos.toml
          files: .
