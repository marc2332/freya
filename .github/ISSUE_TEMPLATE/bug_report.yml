name: Bug Report
description: Report a bug in Freya
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: freya-version
    attributes:
      label: Freya Version
      placeholder: e.g. 0.3.0
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Run `rustc --version` to get this.
      placeholder: e.g. rustc 1.78.0 (9f724c98f 2024-04-17)
    validations:
      required: true
  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: e.g. Ubuntu 24.04 / Windows 11 / macOS 14.4
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context or screenshots about the bug.
